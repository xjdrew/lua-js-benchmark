  th { background: #f8fafc; font-weight: 600; }
  td:first-child, th:first-child { text-align: left; }
  tr:nth-child(even) { background: #f8fafc; }
  .baseline { color: #666; font-style: italic; }
  .faster { color: #059669; font-weight: 600; }
  .slower { color: #dc2626; }
  .rank { font-weight: 700; font-size: 18px; }
  .subtitle { text-align: center; color: #666; margin-bottom: 20px; }

const COLORS = {
  'lua':       { bg: 'rgba(59,130,246,0.7)',  border: '#3b82f6'  },
  'luajit':    { bg: 'rgba(16,185,129,0.7)',  border: '#10b981'  },
  'quickjs':   { bg: 'rgba(245,158,11,0.7)',  border: '#f59e0b'  },
  'v8':        { bg: 'rgba(239,68,68,0.7)',   border: '#ef4444'  },
  'v8-nojit':  { bg: 'rgba(168,85,247,0.7)',  border: '#a855f7'  },
};

const CAT_COLORS = [
  'rgba(59,130,246,0.8)',
  'rgba(16,185,129,0.8)',
  'rgba(245,158,11,0.8)',
  'rgba(239,68,68,0.8)',
  'rgba(168,85,247,0.8)',
  'rgba(236,72,153,0.8)',
  'rgba(107,114,128,0.8)',
];

function getColor(engine) {
  return COLORS[engine] || { bg: 'rgba(107,114,128,0.7)', border: '#6b7280' };
}

// Overall stacked bar chart
function renderOverall() {
  const overall = DATA.overall;
  const labels = overall.map(o => o.engine);
  const categories = DATA.categories;

  const datasets = categories.map((cat, i) => ({
    label: cat,
    data: overall.map(o => (o.category_breakdown[cat] || 0)),
    backgroundColor: CAT_COLORS[i % CAT_COLORS.length],
  }));

  new Chart(document.getElementById('overallChart'), {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: { stacked: true },
        y: { stacked: true, title: { display: true, text: 'Total Time (ms)' } },
      },
      plugins: {
        title: { display: true, text: 'Overall Performance (stacked by category) — lower is better' },
        tooltip: {
          callbacks: {
            afterBody: function(items) {
              const idx = items[0].dataIndex;
              const o = overall[idx];
              return `\nTotal: ${o.total_ms.toFixed(0)} ms (${o.relative.toFixed(2)}x vs ${DATA.baseline})`;
            }
          }
        }
      }
    }
  });

  // Overall table
  const table = document.getElementById('overallTable');
  let html = '<tr><th>Rank</th><th>Engine</th><th>Total Time (ms)</th><th>vs ' + DATA.baseline + '</th></tr>';
  overall.forEach((o, i) => {
    const cls = o.engine === DATA.baseline ? 'baseline' : (o.relative < 1 ? 'faster' : 'slower');
    html += `<tr><td class="rank">#${i+1}</td><td>${o.engine}</td><td>${o.total_ms.toFixed(0)}</td><td class="${cls}">${o.relative.toFixed(2)}x</td></tr>`;
  });
  table.innerHTML = html;
}

// Category grouped bar chart
function renderCategory() {
  const categories = Object.keys(DATA.category_summary);
  const engines = DATA.engines;

  const datasets = engines.map(engine => ({
    label: engine,
    data: categories.map(cat => DATA.category_summary[cat][engine] || 0),
    backgroundColor: getColor(engine).bg,
    borderColor: getColor(engine).border,
    borderWidth: 1,
  }));

  new Chart(document.getElementById('categoryChart'), {
    type: 'bar',
    data: { labels: categories, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { title: { display: true, text: 'Relative to ' + DATA.baseline + ' (1.0x)' } },
      },
      plugins: {
        title: { display: true, text: 'Performance by Category (relative to ' + DATA.baseline + ')' },
        annotation: {
          annotations: {
            baseline: { type: 'line', yMin: 1, yMax: 1, borderColor: '#333', borderDash: [5,5] }
          }
        }
      }
    }
  });
}

// Detail chart
function renderDetail() {
  const benchmarks = DATA.benchmarks;
  const labels = benchmarks.map(b => b.name);
  const engines = DATA.engines;

  const datasets = engines.map(engine => ({
    label: engine,
    data: benchmarks.map(b => b[engine] ? b[engine].wall_ms : 0),
    backgroundColor: getColor(engine).bg,
    borderColor: getColor(engine).border,
    borderWidth: 1,
  }));

  new Chart(document.getElementById('detailChart'), {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      scales: {
        x: { title: { display: true, text: 'Time (ms)' } },
      },
      plugins: {
        title: { display: true, text: 'All Benchmarks — Absolute Time (ms)' },
      }
    }
  });

  // Detail table
  const table = document.getElementById('detailTable');
  let html = '<tr><th>Benchmark</th><th>Category</th><th>' + DATA.baseline + ' (ms)</th>';
  engines.filter(e => e !== DATA.baseline).forEach(e => { html += `<th>${e}</th>`; });
  html += '</tr>';

  benchmarks.forEach(b => {
    const base = b[DATA.baseline];
    html += `<tr><td>${b.name}</td><td>${b.category}</td>`;
    html += `<td>${base ? base.wall_ms.toFixed(0) : '-'}</td>`;
    engines.filter(e => e !== DATA.baseline).forEach(e => {
      const d = b[e];
      if (d) {
        const cls = d.relative < 1 ? 'faster' : (d.relative > 1 ? 'slower' : '');
        html += `<td class="${cls}">${d.relative.toFixed(2)}x</td>`;
      } else {
        html += '<td>-</td>';
      }
    });
    html += '</tr>';
  });
  table.innerHTML = html;
}

// Radar chart
function renderRadar() {
  const categories = Object.keys(DATA.category_summary);
  const engines = DATA.engines;

  const datasets = engines.map(engine => {
    const color = getColor(engine);
    return {
      label: engine,
      data: categories.map(cat => {
        const val = DATA.category_summary[cat][engine] || 1;
        return 1 / val;
      }),
      backgroundColor: color.bg.replace('0.7', '0.2'),
      borderColor: color.border,
      borderWidth: 2,
      pointRadius: 4,
    };
  });

  new Chart(document.getElementById('radarChart'), {
    type: 'radar',
    data: { labels: categories, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        r: {
          beginAtZero: true,
          ticks: { display: false },
        }
      },
      plugins: {
        title: { display: true, text: 'Engine Strengths (higher = faster, 1/relative)' },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              const cat = categories[ctx.dataIndex];
              const engine = ctx.dataset.label;
              const rel = DATA.category_summary[cat][engine] || 0;
              return `${engine}: ${rel.toFixed(2)}x vs ${DATA.baseline}`;
            }
          }
        }
      }
    }
  });
}

// Memory chart
function renderMemory() {
  const mem = DATA.memory;
  const labels = mem.map(m => m.name);
  const engines = DATA.engines;

  const datasets = engines.map(engine => ({
    label: engine,
    data: mem.map(m => m[engine] || 0),
    backgroundColor: getColor(engine).bg,
    borderColor: getColor(engine).border,
    borderWidth: 1,
  }));

  new Chart(document.getElementById('memoryChart'), {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      scales: {
        x: { title: { display: true, text: 'Peak RSS (KB)' } },
      },
      plugins: {
        title: { display: true, text: 'Memory Usage — Peak Resident Set Size (KB)' },
      }
    }
  });
}

function renderEnvironment() {
  const info = DATA.system_info;
  if (!info || !info.system) return;

  document.getElementById('envSection').style.display = 'block';

  const sys = info.system;
  const table = document.getElementById('envTable');
  let html = '<tr><th style="width:150px">Item</th><th>Value</th></tr>';
  html += `<tr><td>Date</td><td>${sys.date || '-'}</td></tr>`;
  html += `<tr><td>OS</td><td>${sys.os || '-'} ${sys.kernel || ''}</td></tr>`;
  html += `<tr><td>Architecture</td><td>${sys.arch || '-'}</td></tr>`;
  html += `<tr><td>CPU</td><td>${sys.cpu || '-'}</td></tr>`;
  html += `<tr><td>CPU Cores</td><td>${sys.cpu_cores || '-'}</td></tr>`;
  html += `<tr><td>Memory</td><td>${sys.memory || '-'}</td></tr>`;
  const cfg = info.config;
  if (cfg) {
    html += `<tr><td>Runs</td><td>${cfg.runs}</td></tr>`;
    html += `<tr><td>Warmup</td><td>${cfg.warmup}</td></tr>`;
  }
  table.innerHTML = html;

  const engines = info.engines;
  if (engines) {
    const etable = document.getElementById('enginesTable');
    let ehtml = '<tr><th>Engine</th><th>Name</th><th>Version</th></tr>';
    for (const [eid, edata] of Object.entries(engines)) {
      ehtml += `<tr><td>${eid}</td><td>${edata.display_name || eid}</td><td>${edata.version || '-'}</td></tr>`;
    }
    etable.innerHTML = ehtml;
  }
}

renderEnvironment();
renderOverall();
renderCategory();
renderDetail();
renderRadar();
renderMemory();
</script>
